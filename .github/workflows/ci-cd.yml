name: DevOps CI/CD Pipeline

on:
  push:
    branches:
      - main

jobs:

  build-and-push:

    runs-on: ubuntu-latest

    steps:

      - name: Checkout Repository
        uses: actions/checkout@v3

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v3
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Login to Amazon ECR
        uses: aws-actions/amazon-ecr-login@v1

      - name: Build Backend Docker Image
        run: |
          docker build -t backend ./backend
          docker tag backend:latest ${{ secrets.ECR_BACKEND }}:${{ github.sha }}

      - name: Build Frontend Docker Image
        run: |
          docker build -t frontend ./frontend
          docker tag frontend:latest ${{ secrets.ECR_FRONTEND }}:${{ github.sha }}

      - name: Push Backend Image
        run: |
          docker push ${{ secrets.ECR_BACKEND }}:${{ github.sha }}

      - name: Push Frontend Image
        run: |
          docker push ${{ secrets.ECR_FRONTEND }}:${{ github.sha }}

  terraform:

    runs-on: ubuntu-latest
    needs: build-and-push

    steps:

      - name: Checkout Repository
        uses: actions/checkout@v3

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v3
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Terraform Init
        working-directory: terraform
        run: terraform init

      - name: Terraform Apply
        working-directory: terraform
        run: terraform apply -auto-approve

  deploy:

    runs-on: ubuntu-latest
    needs: terraform

    steps:

      - name: Deploy to EC2
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ubuntu
          key: ${{ secrets.EC2_SSH_KEY }}

          script: |

            sudo apt update
            sudo apt install docker.io awscli -y

            sudo systemctl start docker
            sudo systemctl enable docker

            REGION=${{ secrets.AWS_REGION }}
            ACCOUNT_ID=$(echo ${{ secrets.ECR_BACKEND }} | cut -d'.' -f1)

            aws ecr get-login-password --region $REGION \
            | sudo docker login --username AWS --password-stdin $ACCOUNT_ID.dkr.ecr.$REGION.amazonaws.com

            sudo docker pull ${{ secrets.ECR_BACKEND }}:${{ github.sha }}
            sudo docker pull ${{ secrets.ECR_FRONTEND }}:${{ github.sha }}

            sudo docker stop backend || true
            sudo docker stop frontend || true

            sudo docker rm backend || true
            sudo docker rm frontend || true

            sudo docker run -d -p 8000:8000 --name backend \
            ${{ secrets.ECR_BACKEND }}:${{ github.sha }}

            sudo docker run -d -p 80:5173 --name frontend \
            ${{ secrets.ECR_FRONTEND }}:${{ github.sha }}